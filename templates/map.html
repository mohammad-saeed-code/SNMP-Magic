<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Network Map — snmp-magic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Toolbar ---- */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: .03em;
      margin-right: 4px;
    }

    #cidr-input {
      background: #0f1117;
      border: 1px solid #3d4268;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 6px 10px;
      font-size: 13px;
      width: 180px;
      outline: none;
    }
    #cidr-input:focus { border-color: #6366f1; }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-ghost   { background: #2d3148; color: #a5b4fc; }

    #status-bar {
      font-size: 12px;
      color: #64748b;
      margin-left: auto;
    }
    #status-bar.running { color: #fbbf24; }
    #status-bar.done    { color: #34d399; }
    #status-bar.error   { color: #f87171; }

    /* Legend */
    #legend {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 11px;
      color: #64748b;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* ---- Main area ---- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #network-canvas {
      flex: 1;
      background: #0f1117;
    }

    /* ---- Side panel ---- */
    #side-panel {
      width: 280px;
      background: #1a1d27;
      border-left: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid #2d3148;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    #panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    #panel-content .empty {
      color: #4a5568;
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
    }

    .detail-row {
      margin-bottom: 10px;
    }
    .detail-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 2px;
    }
    .detail-value {
      font-size: 13px;
      color: #e2e8f0;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-gateway { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .badge-router  { background: #1d4ed822; color: #60a5fa; border: 1px solid #1d4ed844; }
    .badge-host    { background: #05966922; color: #34d399; border: 1px solid #05966944; }

    /* Stats row */
    #stats-row {
      display: flex;
      gap: 0;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .stat-cell {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      border-right: 1px solid #2d3148;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-num {
      font-size: 18px;
      font-weight: 700;
      color: #a5b4fc;
    }
    .stat-lbl {
      font-size: 10px;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* Progress bar */
    #progress-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 280px;
      height: 3px;
      background: #1a1d27;
      display: none;
    }
    #progress-bar {
      height: 100%;
      background: #6366f1;
      transition: width .3s ease;
      width: 0%;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button class="btn btn-ghost" onclick="history.length > 1 ? history.back() : location.href='/devices'" title="Back to devices">← Back</button>
  <h1>🗺 Network Map</h1>

  <input id="cidr-input" type="text" placeholder="e.g. 192.168.1.0/24" autocomplete="off"/>
  <button class="btn btn-primary" id="scan-btn" onclick="startScan()">Scan Network</button>
  <button class="btn btn-ghost" onclick="fitGraph()">Fit</button>
  <button class="btn btn-ghost" onclick="togglePhysics()">Toggle Physics</button>

  <div id="legend">
    <span><span class="legend-dot" style="background:#a78bfa"></span>Gateway</span>
    <span><span class="legend-dot" style="background:#60a5fa"></span>Router</span>
    <span><span class="legend-dot" style="background:#34d399"></span>Host</span>
    <span><span class="legend-dot" style="background:#f87171"></span>Unknown</span>
  </div>

  <div id="status-bar">Loading last snapshot…</div>
</div>

<div id="main">
  <div id="network-canvas"></div>

  <div id="side-panel">
    <div id="panel-header">Device Details</div>
    <div id="panel-content">
      <div class="empty">Click a node to see details</div>
    </div>
    <div id="stats-row">
      <div class="stat-cell"><div class="stat-num" id="stat-nodes">—</div><div class="stat-lbl">Nodes</div></div>
      <div class="stat-cell"><div class="stat-num" id="stat-edges">—</div><div class="stat-lbl">Links</div></div>
      <div class="stat-cell"><div class="stat-num" id="stat-alive">—</div><div class="stat-lbl">Alive</div></div>
    </div>
  </div>
</div>

<div id="progress-wrap">
  <div id="progress-bar"></div>
</div>

<script>
// ============================================================
// vis.js network setup
// ============================================================
const container = document.getElementById("network-canvas");

const visNodes = new vis.DataSet([]);
const visEdges = new vis.DataSet([]);

const options = {
  nodes: {
    shape: "dot",
    size: 14,
    font: { color: "#e2e8f0", size: 12, face: "system-ui" },
    borderWidth: 2,
  },
  edges: {
    width: 1.5,
    color: { color: "#2d3148", highlight: "#6366f1", hover: "#a5b4fc" },
    smooth: { type: "dynamic" },
    arrows: { to: { enabled: false } },
  },
  physics: {
    enabled: true,
    solver: "forceAtlas2Based",
    forceAtlas2Based: {
      gravitationalConstant: -40,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.06,
      damping: 0.4,
    },
    stabilization: { iterations: 200 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    zoomView: true,
    dragView: true,
  },
};

const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

network.on("click", function(params) {
  if (params.nodes.length > 0) {
    showNodeDetail(params.nodes[0]);
  }
});

let physicsOn = true;
function togglePhysics() {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
}
function fitGraph() {
  network.fit({ animation: { duration: 600, easingFunction: "easeInOutQuad" } });
}

// ============================================================
// Node color / style by type
// ============================================================
const TYPE_STYLE = {
  gateway: { color: { background: "#7c3aed", border: "#a78bfa" }, size: 22 },
  router:  { color: { background: "#1d4ed8", border: "#60a5fa" }, size: 18 },
  host:    { color: { background: "#059669", border: "#34d399" }, size: 13 },
  unknown: { color: { background: "#b91c1c", border: "#f87171" }, size: 13 },
};

function nodeStyle(n) {
  return TYPE_STYLE[n.node_type] || TYPE_STYLE.unknown;
}

// ============================================================
// Render graph from snapshot data
// ============================================================
let _currentNodes = {};

function renderGraph(data) {
  _currentNodes = {};
  data.nodes.forEach(n => { _currentNodes[n.id] = n; });

  const nodes = data.nodes.map(n => ({
    id:    n.id,
    label: n.label,
    title: buildTooltip(n),
    ...nodeStyle(n),
  }));

  const edges = data.edges.map((e, i) => ({
    id:   `e${i}`,
    from: e.source,
    to:   e.target,
    dashes: e.kind === "trace",
  }));

  visNodes.clear();
  visEdges.clear();
  visNodes.add(nodes);
  visEdges.add(edges);

  // Stats
  const alive = data.nodes.filter(n => n.alive).length;
  document.getElementById("stat-nodes").textContent = data.nodes.length;
  document.getElementById("stat-edges").textContent = data.edges.length;
  document.getElementById("stat-alive").textContent = alive;

  if (data.scanned_at) {
    const d = new Date(data.scanned_at + "Z");
    setStatus("done", `Last scan: ${d.toLocaleString()}`);
  }
}

function buildTooltip(n) {
  const lines = [`<b>${n.label}</b>`, `IP: ${n.id}`];
  if (n.hostname && n.hostname !== n.label) lines.push(`Host: ${n.hostname}`);
  if (n.vendor)   lines.push(`Vendor: ${n.vendor}`);
  if (n.sys_descr) lines.push(`Descr: ${n.sys_descr.slice(0, 60)}`);
  lines.push(`Type: ${n.node_type}`);
  return lines.join("<br/>");
}

// ============================================================
// Side panel detail
// ============================================================
function showNodeDetail(nodeId) {
  const n = _currentNodes[nodeId];
  if (!n) return;

  const badgeClass = { gateway: "badge-gateway", router: "badge-router", host: "badge-host" }[n.node_type] || "badge-router";

  const rows = [
    ["IP Address",   n.id],
    ["Type",         `<span class="badge ${badgeClass}">${n.node_type}</span>`],
    ["Label",        n.label],
    n.hostname  ? ["Hostname",  n.hostname]  : null,
    n.sys_name  ? ["SNMP Name", n.sys_name]  : null,
    n.sys_descr ? ["SNMP Descr", n.sys_descr] : null,
    n.vendor    ? ["Vendor",    n.vendor]    : null,
    n.mac       ? ["MAC",       n.mac]       : null,
    ["Alive",        n.alive ? "✅ Yes" : "❌ No"],
  ].filter(Boolean);

  const html = rows.map(([lbl, val]) => `
    <div class="detail-row">
      <div class="detail-label">${lbl}</div>
      <div class="detail-value">${val}</div>
    </div>
  `).join("");

  document.getElementById("panel-content").innerHTML = html;
}

// ============================================================
// Status bar
// ============================================================
function setStatus(cls, msg) {
  const el = document.getElementById("status-bar");
  el.className = cls;
  el.textContent = msg;
}

function setProgress(pct) {
  const wrap = document.getElementById("progress-wrap");
  const bar  = document.getElementById("progress-bar");
  if (pct <= 0) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  bar.style.width = pct + "%";
}

// ============================================================
// Scan
// ============================================================
let _pollTimer = null;

async function startScan() {
  const cidr = document.getElementById("cidr-input").value.trim();
  if (!cidr) { alert("Enter a CIDR range first, e.g. 192.168.1.0/24"); return; }

  document.getElementById("scan-btn").disabled = true;
  setStatus("running", "Starting scan…");
  setProgress(5);

  try {
    const resp = await fetch("/api/map/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cidr, max_hops: 20 }),
      credentials: "include",
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }

    const { job_id } = await resp.json();
    pollJob(job_id);
  } catch (e) {
    setStatus("error", "Error: " + e.message);
    setProgress(0);
    document.getElementById("scan-btn").disabled = false;
  }
}

function pollJob(jobId) {
  if (_pollTimer) clearInterval(_pollTimer);

  _pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/api/map/scan/${jobId}/status`, { credentials: "include" });
      const s    = await resp.json();

      const pct = s.percent || 0;
      setProgress(pct);

      const statusMsg = s.meta?.status || s.status || "";
      setStatus("running", `Scanning… ${pct}%  [${statusMsg}]`);

      if (s.status === "done") {
        clearInterval(_pollTimer);
        setProgress(100);
        // Load fresh snapshot
        await loadSnapshot();
        setProgress(0);
        document.getElementById("scan-btn").disabled = false;
      } else if (s.status === "error") {
        clearInterval(_pollTimer);
        setStatus("error", "Scan failed: " + (s.error || "unknown error"));
        setProgress(0);
        document.getElementById("scan-btn").disabled = false;
      }
    } catch (e) {
      clearInterval(_pollTimer);
      setStatus("error", "Polling error: " + e.message);
      setProgress(0);
      document.getElementById("scan-btn").disabled = false;
    }
  }, 1500);
}

// ============================================================
// Load persisted snapshot on page open
// ============================================================
async function loadSnapshot() {
  try {
    const resp = await fetch("/api/map/snapshot", { credentials: "include" });
    const data = await resp.json();

    if (data.nodes && data.nodes.length > 0) {
      renderGraph(data);
      // Pre-fill CIDR input if available
      if (data.cidr) {
        document.getElementById("cidr-input").value = data.cidr;
      }
    } else {
      setStatus("", "No map yet — enter a CIDR and click Scan");
    }
  } catch (e) {
    setStatus("error", "Could not load snapshot: " + e.message);
  }
}

// ============================================================
// Boot
// ============================================================
loadSnapshot();
</script>
</body>
</html>
