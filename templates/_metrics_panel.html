{# templates/ui/panels/metrics.html #}

<div class="metrics-grid">

  <div class="metric-cell">
    <div class="metric-icon">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    </div>
    <span class="metric-value cyan">{{ devices_count }}</span>
    <span class="metric-label">Devices</span>
  </div>

  <div class="metric-cell">
    <div class="metric-icon green">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <span class="metric-value green">{{ scans_count }}</span>
    <span class="metric-label">Scans</span>
  </div>

  <div class="metric-cell" style="grid-column: span 2;">
    <div class="metric-last">
      <div style="display:flex; align-items:center; gap:0.4rem;">
        <div class="metric-icon" style="flex-shrink:0;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <span class="metric-label">Last Scan</span>
      </div>
      {% if last_scan %}
        <span class="metric-ts">{{ last_scan.strftime("%Y-%m-%d %H:%M") }}</span>
      {% else %}
        <span class="metric-ts dim">no scans yet</span>
      {% endif %}
    </div>
  </div>

</div>

<style>
  /* These styles scope only to this partial and extend the base system */
  .metric-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    background: var(--s3);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .metric-icon.green { color: var(--green); }
  .metric-icon.cyan  { color: var(--cyan); }

  .metric-last {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .metric-ts {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .metric-ts.dim { color: var(--dim); }
</style>
