<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — SNMP Magic</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Deep Dark Palette */
      --bg-main: #020617;        /* Near black slate */
      --bg-card: #0f172a;        /* Deep navy/slate */
      --primary: #3b82f6;        /* Electric Blue */
      --primary-hover: #60a5fa;
      --text-main: #f8fafc;      /* Crisp white/gray */
      --text-muted: #94a3b8;     /* Muted slate */
      --border: #1e293b;         /* Subtle border */
      --input-bg: #1e293b;
      --input-focus: #3b82f6;
      --danger: #ef4444;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-main);
      /* Subtle mesh gradient for depth */
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.4) 0px, transparent 50%);
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeIn 0.6s ease-out;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-area img {
      width: 180px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3));
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.025em;
    }

    .description {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background-color: var(--input-bg);
      color: var(--text-main);
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      background-color: #162033;
    }

    /* See Password Button */
    .toggle-password {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--primary);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .error-msg {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      font-size: 14px;
      text-align: center;
    }

    .bottom-links {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
    }

    .bottom-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .bottom-links a:hover {
      color: var(--primary);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo-area">
      <img src="/static/img/snmp-magic-logo.png" alt="SNMP Magic" />
      <h1>System Login</h1>
      <p class="description">Authorized personnel only.</p>
    </div>

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          <button type="button" class="toggle-password" id="seePassword" title="Toggle visibility">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" type="submit">Access Console</button>

      {% if error %}
        <div class="error-msg">
          {{ error }}
        </div>
      {% endif %}
    </form>

    <div class="bottom-links">
      <a href="/health">Network Status: <span style="color:#22c55e">Online</span></a>
    </div>

    <div class="footer">
      &copy; 2026 SNMP Magic &bull; Secure Environment
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('seePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      
      // Optional: Change icon appearance when toggled
      eyeIcon.style.color = isPassword ? 'var(--primary)' : 'var(--text-muted)';
    });
  </script>
</body>
</html>
